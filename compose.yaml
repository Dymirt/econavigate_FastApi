services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env.local
    ports:
      # Reachable by a reverse proxy or Cloudflare Tunnel connector on the LAN.
      # Restrict TCP 8000 to that connector with the host/network firewall.
      - "0.0.0.0:8000:8000"
    volumes:
      - eco-cache:/data/cache
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  eco-cache:
